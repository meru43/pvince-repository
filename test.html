<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>회원 / 상품 / 구매 / 다운로드 테스트</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.5;
    }

    h1 {
      margin-bottom: 24px;
    }

    .auth-box,
    .action-box,
    .result-box {
      margin-bottom: 24px;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    .auth-box input {
      display: block;
      width: 100%;
      max-width: 320px;
      margin-bottom: 10px;
      padding: 10px;
      font-size: 14px;
    }

    .action-box button {
      margin: 4px 6px 4px 0;
      padding: 8px 12px;
      cursor: pointer;
    }

    #result {
      white-space: pre-wrap;
      background: #fafafa;
      min-height: 120px;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #eee;
    }
  </style>
</head>

<body>

  <h1>회원 / 상품 / 구매 / 다운로드 테스트</h1>

  <div class="auth-box">
    <input type="text" id="username" placeholder="아이디 입력">
    <input type="password" id="password" placeholder="비밀번호 입력">
  </div>

  <div class="action-box">
    <button onclick="register()">회원가입</button>
    <button onclick="login()">로그인</button>
    <button onclick="checkMe()">내 로그인 상태 확인</button>
    <button onclick="logout()">로그아웃</button>
    <button onclick="loadProducts()">상품 목록 보기</button>
    <button onclick="purchaseProduct(1)">상품 1 구매</button>
    <button onclick="purchaseProduct(2)">상품 2 구매</button>
    <button onclick="downloadProduct(1)">상품 1 다운로드</button>
    <button onclick="downloadProduct(2)">상품 2 다운로드</button>
    <button onclick="loadMyProducts()">내 구매 상품 보기</button>
    <button onclick="loadMyDownloadLogs()">내 다운로드 기록 보기</button>
  </div>

  <div class="result-box">
    <h3>결과</h3>
    <pre id="result"></pre>
  </div>

  <script>
    const API_BASE = 'http://127.0.0.1:3000';

    function setResult(text) {
      document.getElementById('result').textContent = text;
    }

    function getInputValues() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      return { username, password };
    }

    function register() {
      const { username, password } = getInputValues();

      fetch(`${API_BASE}/register`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        credentials: 'include',
        body: JSON.stringify({ username, password })
      })
        .then(res => res.json())
        .then(data => {
          console.log('회원가입 응답:', data);
          setResult(JSON.stringify(data, null, 2));
          alert(data.message);
        })
        .catch(err => {
          console.error('회원가입 에러:', err);
          setResult('회원가입 요청 실패');
          alert('회원가입 요청 실패');
        });
    }

    function login() {
      const { username, password } = getInputValues();

      fetch(`${API_BASE}/login`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        credentials: 'include',
        body: JSON.stringify({ username, password })
      })
        .then(res => res.json())
        .then(data => {
          console.log('로그인 응답:', data);
          setResult(JSON.stringify(data, null, 2));
          alert(data.message);
        })
        .catch(err => {
          console.error('로그인 에러:', err);
          setResult('로그인 요청 실패');
          alert('로그인 요청 실패');
        });
    }

    function checkMe() {
      fetch(`${API_BASE}/me`, {
        method: 'GET',
        credentials: 'include'
      })
        .then(res => res.json())
        .then(data => {
          console.log('로그인 상태 응답:', data);
          setResult(JSON.stringify(data, null, 2));
        })
        .catch(err => {
          console.error('로그인 상태 확인 에러:', err);
          setResult('로그인 상태 확인 실패');
        });
    }

    function logout() {
      fetch(`${API_BASE}/logout`, {
        method: 'POST',
        credentials: 'include'
      })
        .then(res => res.json())
        .then(data => {
          console.log('로그아웃 응답:', data);
          setResult(JSON.stringify(data, null, 2));
          alert(data.message);
        })
        .catch(err => {
          console.error('로그아웃 에러:', err);
          setResult('로그아웃 실패');
          alert('로그아웃 실패');
        });
    }

    function loadProducts() {
      fetch(`${API_BASE}/products`, {
        method: 'GET',
        credentials: 'include'
      })
        .then(res => res.json())
        .then(data => {
          console.log('상품 목록 응답:', data);
          setResult(JSON.stringify(data, null, 2));
        })
        .catch(err => {
          console.error('상품 목록 에러:', err);
          setResult('상품 목록 불러오기 실패');
        });
    }

    function purchaseProduct(productId) {
      fetch(`${API_BASE}/purchase`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        credentials: 'include',
        body: JSON.stringify({ productId })
      })
        .then(res => res.json())
        .then(data => {
          console.log('구매 응답:', data);
          setResult(JSON.stringify(data, null, 2));
          alert(data.message);
        })
        .catch(err => {
          console.error('구매 에러:', err);
          setResult('구매 요청 실패');
          alert('구매 요청 실패');
        });
    }

    function downloadProduct(productId) {
      fetch(`${API_BASE}/download/${productId}`, {
        method: 'GET',
        credentials: 'include'
      })
        .then(async res => {
          const contentType = res.headers.get('content-type') || '';

          if (contentType.includes('application/json')) {
            const data = await res.json();
            setResult(JSON.stringify(data, null, 2));
            alert(data.message);
            return;
          }

          const blob = await res.blob();

          let filename = `download-${productId}`;
          const disposition = res.headers.get('content-disposition');

          if (disposition && disposition.includes('filename=')) {
            const match = disposition.match(/filename="?([^"]+)"?/);
            if (match && match[1]) {
              filename = match[1];
            }
          }

          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          window.URL.revokeObjectURL(url);

          setResult(`다운로드 완료: ${filename}`);
        })
        .catch(err => {
          console.error('다운로드 에러:', err);
          setResult('다운로드 요청 실패');
          alert('다운로드 요청 실패');
        });
    }

    function loadMyProducts() {
      fetch(`${API_BASE}/my-products`, {
        method: 'GET',
        credentials: 'include'
      })
        .then(res => res.json())
        .then(data => {
          console.log('내 구매 상품 응답:', data);

          if (!data.products || data.products.length === 0) {
            setResult('구매한 상품이 없습니다.');
            return;
          }

          let text = '';

          data.products.forEach(product => {
            text += `구매기록번호: ${product.purchase_id}\n`;
            text += `구매일: ${product.purchased_at}\n`;
            text += `상품번호: ${product.product_id}\n`;
            text += `상품명: ${product.title}\n`;
            text += `가격: ${product.price}\n`;
            text += `설명: ${product.description}\n`;
            text += `파일명: ${product.file_name}\n`;
            text += '-------------------------\n';
          });

          setResult(text);
        })
        .catch(err => {
          console.error('내 구매 상품 에러:', err);
          setResult('내 구매 상품 불러오기 실패');
        });
    }

    function loadMyDownloadLogs() {
      fetch(`${API_BASE}/my-download-logs`, {
        method: 'GET',
        credentials: 'include'
      })
        .then(res => res.json())
        .then(data => {
          console.log('내 다운로드 기록 응답:', data);

          if (!data.logs || data.logs.length === 0) {
            setResult('다운로드 기록이 없습니다.');
            return;
          }

          let text = '';

          data.logs.forEach(log => {
            text += `기록번호: ${log.log_id}\n`;
            text += `다운로드일: ${log.downloaded_at}\n`;
            text += `상품번호: ${log.product_id}\n`;
            text += `상품명: ${log.title}\n`;
            text += `가격: ${log.price}\n`;
            text += `파일명: ${log.file_name}\n`;
            text += '-------------------------\n';
          });

          setResult(text);
        })
        .catch(err => {
          console.error('내 다운로드 기록 에러:', err);
          setResult('내 다운로드 기록 불러오기 실패');
        });
    }
  </script>

</body>

</html>
