<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상품 리스트</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/product-list.css" />
</head>

<body>
    <header class="site-header">
        <div class="container header-inner">
            <h1 class="logo">
                <a href="/">SJ SHOP</a>
            </h1>

            <nav class="nav">
                <a href="/">메인</a>
                <a href="/products-page">상품리스트</a>
                <a href="/qna-page">Q&A</a>
                <a href="/cart-page">장바구니</a>
                <a href="/mypage-page">마이페이지</a>
                <a href="/login-page">로그인</a>
            </nav>
        </div>
    </header>

    <main class="container page">
        <section class="page-title-wrap">
            <h2 class="page-title">템플릿 상품 리스트</h2>
            <p class="page-desc">원하는 템플릿을 선택해 상세 페이지로 이동해보세요.</p>
        </section>

        <section class="product-grid">
            <article class="product-card">
                <a href="/products-page/1" class="product-thumb">
                    <img src="https://via.placeholder.com/600x400?text=Template+01" alt="템플릿 01" />
                </a>

                <div class="product-info">
                    <p class="product-category">비즈니스</p>
                    <h3 class="product-name">
                        <a href="/products-page/1">미스터 피피티 템플릿 01</a>
                    </h3>
                    <p class="product-price">19,900원</p>
                    <a href="/products-page/1" class="btn btn-outline">상세보기</a>
                </div>
            </article>

            <article class="product-card">
                <a href="/products-page/2" class="product-thumb">
                    <img src="https://via.placeholder.com/600x400?text=Template+02" alt="템플릿 02" />
                </a>

                <div class="product-info">
                    <p class="product-category">포트폴리오</p>
                    <h3 class="product-name">
                        <a href="/products-page/2">미스터 피피티 템플릿 02</a>
                    </h3>
                    <p class="product-price">24,900원</p>
                    <a href="/products-page/2" class="btn btn-outline">상세보기</a>
                </div>
            </article>

            <article class="product-card">
                <a href="/products-page/3" class="product-thumb">
                    <img src="https://via.placeholder.com/600x400?text=Template+03" alt="템플릿 03" />
                </a>

                <div class="product-info">
                    <p class="product-category">제안서</p>
                    <h3 class="product-name">
                        <a href="/products-page/3">미스터 피피티 템플릿 03</a>
                    </h3>
                    <p class="product-price">29,900원</p>
                    <a href="/products-page/3" class="btn btn-outline">상세보기</a>
                </div>
            </article>

            <article class="product-card">
                <a href="/products-page/4" class="product-thumb">
                    <img src="https://via.placeholder.com/600x400?text=Template+04" alt="템플릿 04" />
                </a>

                <div class="product-info">
                    <p class="product-category">보고서</p>
                    <h3 class="product-name">
                        <a href="/products-page/4">미스터 피피티 템플릿 04</a>
                    </h3>
                    <p class="product-price">14,900원</p>
                    <a href="/products-page/4" class="btn btn-outline">상세보기</a>
                </div>
            </article>
        </section>
    </main>
</body>

</html>
