<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주문조회</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/order-check.css" />
</head>

<body>
    <header class="site-header">
        <div class="container header-inner">
            <h1 class="logo">
                <a href="/">SJ SHOP</a>
            </h1>

            <nav class="nav">
                <a href="/">메인</a>
                <a href="/products-page">상품리스트</a>
                <a href="/qna-page">Q&A</a>
                <a href="/cart-page">장바구니</a>
                <a href="/mypage-page">마이페이지</a>
                <a href="/login-page">로그인</a>
            </nav>
        </div>
    </header>

    <main class="container page">
        <section class="order-check-wrap">
            <div class="order-check-box">
                <p class="order-check-label">ORDER CHECK</p>
                <h2 class="order-check-title">비회원 주문조회</h2>
                <p class="order-check-desc">
                    주문번호와 이메일을 입력하면 주문 내역을 확인할 수 있습니다.
                </p>

                <form class="order-check-form">
                    <div class="form-group">
                        <label for="order-number">주문번호</label>
                        <input type="text" id="order-number" placeholder="주문번호를 입력하세요" />
                    </div>

                    <div class="form-group">
                        <label for="order-email">이메일</label>
                        <input type="email" id="order-email" placeholder="이메일을 입력하세요" />
                    </div>

                    <button type="submit" class="btn btn-primary order-check-submit">주문조회하기</button>
                </form>
            </div>

            <div class="order-result-box">
                <div class="result-head">
                    <h3 class="result-title">주문 조회 결과</h3>
                    <span class="result-status">결제 완료</span>
                </div>

                <div class="result-info">
                    <div class="result-info-row">
                        <span>주문번호</span>
                        <strong>20260420-0001</strong>
                    </div>
                    <div class="result-info-row">
                        <span>주문자</span>
                        <strong>홍길동</strong>
                    </div>
                    <div class="result-info-row">
                        <span>결제금액</span>
                        <strong>19,900원</strong>
                    </div>
                </div>

                <div class="result-product">
                    <div class="result-product-thumb">
                        <img src="https://via.placeholder.com/280x190?text=Template+01" alt="템플릿 01" />
                    </div>

                    <div class="result-product-info">
                        <p class="result-product-category">비즈니스</p>
                        <h4 class="result-product-title">미스터 피피티 템플릿 01</h4>
                        <p class="result-product-desc">구매 완료 후 다운로드 가능한 상품입니다.</p>
                    </div>

                    <div class="result-product-side">
                        <a href="#" class="btn btn-primary">다운로드</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
