<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/login.css" />
</head>

<body>
    <header class="site-header">
        <div class="container header-inner">
            <h1 class="logo">
                <a href="/">SJ SHOP</a>
            </h1>

            <nav class="nav">
                <a href="/">메인</a>
                <a href="/products-page">상품리스트</a>
                <a href="/qna-page">Q&A</a>
                <a href="/cart-page">장바구니</a>
                <a href="/mypage-page">마이페이지</a>
                <a href="/login-page">로그인</a>
            </nav>
        </div>
    </header>

    <main class="container page">
        <section class="login-wrap">
            <div class="login-box">
                <p class="login-label">ACCOUNT</p>
                <h2 class="login-title">로그인</h2>
                <p class="login-desc">
                    아이디와 비밀번호를 입력해 로그인하세요.
                </p>

                <form class="login-form">
                    <div class="form-group">
                        <label for="login-id">아이디</label>
                        <input type="text" id="login-id" placeholder="아이디를 입력하세요" />
                    </div>

                    <div class="form-group">
                        <label for="login-password">비밀번호</label>
                        <input type="password" id="login-password" placeholder="비밀번호를 입력하세요" />
                    </div>

                    <button type="submit" class="btn btn-primary login-submit">로그인</button>
                </form>

                <div class="login-links">
                    <a href="#">회원가입</a>
                    <a href="#">비밀번호 찾기</a>
                </div>
            </div>

            <div class="login-side">
                <div class="login-side-card">
                    <p class="login-side-label">WELCOME</p>
                    <h3>템플릿을 구매하고<br />내 상품을 관리해보세요</h3>
                    <p>
                        로그인하면 구매 내역 확인, 다운로드, 주문 관리 등
                        다양한 기능을 이용할 수 있습니다.
                    </p>
                    <a href="/products-page" class="btn btn-outline">상품 보러가기</a>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
