<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/register.css" />
</head>

<body>
    <header class="site-header">
        <div class="container header-inner">
            <h1 class="logo">
                <a href="/">SJ SHOP</a>
            </h1>

            <nav class="nav">
                <a href="/">메인</a>
                <a href="/products-page">상품리스트</a>
                <a href="/login-page">로그인</a>
                <a href="/register-page">회원가입</a>
            </nav>
        </div>
    </header>

    <main class="container page">
        <section class="register-wrap">
            <div class="register-box">
                <p class="register-label">ACCOUNT</p>
                <h2 class="register-title">회원가입</h2>
                <p class="register-desc">
                    아이디와 비밀번호를 입력해 계정을 생성하세요.
                </p>

                <form class="register-form" id="register-form">
                    <div class="form-group">
                        <label for="register-id">아이디</label>
                        <input type="text" id="register-id" placeholder="아이디를 입력하세요" />
                    </div>

                    <div class="form-group">
                        <label for="register-password">비밀번호</label>
                        <input type="password" id="register-password" placeholder="비밀번호를 입력하세요" />
                    </div>

                    <div class="form-group">
                        <label for="register-password-confirm">비밀번호 확인</label>
                        <input type="password" id="register-password-confirm" placeholder="비밀번호를 다시 입력하세요" />
                    </div>

                    <p class="register-error" id="register-error"></p>

                    <button type="submit" class="btn btn-primary register-submit">회원가입</button>
                </form>

                <div class="register-links">
                    <a href="/login-page">이미 계정이 있나요? 로그인</a>
                </div>
            </div>

            <div class="register-side">
                <div class="register-side-card">
                    <p class="register-side-label">WELCOME</p>
                    <h3>회원가입 후<br />템플릿을 더 편하게 관리해보세요</h3>
                    <p>
                        회원가입을 하면 구매 내역 확인, 다운로드, 주문 관리 등
                        다양한 기능을 이용할 수 있습니다.
                    </p>
                    <a href="/products-page" class="btn btn-outline">상품 보러가기</a>
                </div>
            </div>
        </section>
    </main>

    <script src="/js/register.js"></script>
</body>

</html>
